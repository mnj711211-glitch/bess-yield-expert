name: ESS 抓取資料

on:
  schedule:
    # UTC 時間；台北 = UTC+8。涵蓋台北約 05:00-20:00，每 30 分鐘一次
    - cron: "*/30 21-23,0-11 * * *"
  workflow_dispatch: {}   # 允許在 Actions 頁面手動執行
  push:
    branches: [master]
    paths: [ess-backend/run_fetch.py]   # 診斷用：改此檔即觸發一次雲端執行

concurrency:
  group: ess-fetch
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      TZ: Asia/Taipei
      GMS_URL: ${{ secrets.GMS_URL }}
      GMS_USERNAME: ${{ secrets.GMS_USERNAME }}
      GMS_PASSWORD: ${{ secrets.GMS_PASSWORD }}
      TN_EMAIL: ${{ secrets.TN_EMAIL }}
      TN_PASSWORD: ${{ secrets.TN_PASSWORD }}
      IPVITA_ACCOUNT: ${{ secrets.IPVITA_ACCOUNT }}
      IPVITA_PASSWORD: ${{ secrets.IPVITA_PASSWORD }}
      SOLAREDGE_EMAIL: ${{ secrets.SOLAREDGE_EMAIL }}
      SOLAREDGE_PASSWORD: ${{ secrets.SOLAREDGE_PASSWORD }}
      SEPV_ACCOUNT: ${{ secrets.SEPV_ACCOUNT }}
      SEPV_PASSWORD: ${{ secrets.SEPV_PASSWORD }}
      LINE_TOKEN: ${{ secrets.LINE_TOKEN }}
      LINE_GROUP_ID: ${{ secrets.LINE_GROUP_ID }}
      CWA_KEY: ${{ secrets.CWA_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: 安裝套件
        working-directory: ess-backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: 寫入 Firebase 金鑰
        working-directory: ess-backend
        run: echo "${{ secrets.FIREBASE_KEY_B64 }}" | base64 -d > firebase-key.json

      - name: 抓取並推送 Firestore
        working-directory: ess-backend
        run: python run_fetch.py
