<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>綠源科技 工程報價資料庫</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans TC',system-ui,sans-serif;background:#f5f5f0;color:#1a1a1a;min-height:100vh}
.header{background:#1a1a1a;color:#fff;padding:14px 24px;display:flex;align-items:center;gap:12px}
.logo{width:34px;height:34px;background:#c8b400;border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:#1a1a1a;flex-shrink:0}
.header h1{font-size:16px;font-weight:500}
.header .sub{font-size:12px;color:#aaa;margin-left:auto;white-space:nowrap}
.tabs{display:flex;background:#fff;border-bottom:1px solid #e0e0d8;padding:0 20px}
.tab{padding:11px 18px;font-size:14px;border:none;background:none;cursor:pointer;color:#666;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s}
.tab.on{color:#1a1a1a;border-bottom-color:#c8b400;font-weight:500}
.panel{display:none;padding:20px}
.panel.on{display:block}
.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px}
.stat{background:#fff;border-radius:8px;padding:12px 16px;border:1px solid #e8e8e0}
.stat-num{font-size:22px;font-weight:600}
.stat-label{font-size:12px;color:#888;margin-top:3px}
.toolbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:12px}
.toolbar input[type=text]{flex:1;min-width:200px;padding:8px 12px;font-size:14px;border:1px solid #d0d0c8;border-radius:6px;outline:none}
.toolbar input[type=text]:focus{border-color:#c8b400}
.filter-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.fbtn{padding:4px 12px;font-size:12px;border:1px solid #d0d0c8;border-radius:99px;cursor:pointer;background:#fff;color:#666;transition:all .1s}
.fbtn.on{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.source-row{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:14px}
.sbtn{padding:3px 9px;font-size:11px;border:1px solid #d0d0c8;border-radius:99px;cursor:pointer;background:#fff;color:#888}
.sbtn.on{background:#c8b40022;color:#7a6200;border-color:#c8b400}
.list{display:flex;flex-direction:column;gap:5px;max-height:62vh;overflow-y:auto}
.card{background:#fff;border:1px solid #e8e8e0;border-radius:8px;padding:10px 14px;display:flex;justify-content:space-between;align-items:center;gap:10px;transition:border-color .1s}
.card:hover{border-color:#c8b400}
.card-left{flex:1;min-width:0}
.cname{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cmeta{font-size:11px;color:#888;display:flex;flex-wrap:wrap;gap:4px;margin-top:3px}
.badge{display:inline-block;padding:1px 7px;border-radius:99px;font-size:11px}
.bc{background:#fff3d6;color:#7a5200}
.bs{background:#e8f0ff;color:#1a40a0}
.bsrc{background:#f0f0ee;color:#555}
.bap{background:#e8ffe8;color:#1a5a1a}
.card-right{text-align:right;flex-shrink:0;display:flex;align-items:center;gap:10px}
.cprice{font-size:17px;font-weight:600;white-space:nowrap}
.cunit{font-size:11px;color:#888}
.cap{font-size:11px;color:#888;margin-top:2px}
.del{padding:3px 8px;font-size:11px;border:1px solid #e0c0b8;border-radius:4px;color:#c84800;cursor:pointer;background:#fff;flex-shrink:0}
.del:hover{background:#fff0ee}
.empty{text-align:center;padding:3rem;color:#888;font-size:14px}
.btn{padding:7px 14px;font-size:13px;border:1px solid #d0d0c8;border-radius:6px;cursor:pointer;background:#fff;white-space:nowrap}
.btn:hover{background:#f5f5f0}
.btn-p{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.btn-p:hover{background:#333}
textarea{width:100%;font-size:13px;font-family:monospace;border:1px solid #d0d0c8;border-radius:6px;padding:10px;resize:vertical;min-height:130px;outline:none;background:#fafafa}
textarea:focus{border-color:#c8b400}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.fg label{display:block;font-size:12px;color:#666;margin-bottom:3px}
.fg input,.fg select{width:100%;padding:7px 10px;font-size:13px;border:1px solid #d0d0c8;border-radius:6px;outline:none;background:#fff}
.fg input:focus,.fg select:focus{border-color:#c8b400}
hr{border:none;border-top:1px solid #e8e8e0;margin:18px 0}
.quick-wrap{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.qtag{padding:5px 12px;font-size:13px;border:1px solid #d0d0c8;border-radius:99px;cursor:pointer;background:#fff;color:#555}
.qtag:hover{background:#f5f5f0;color:#1a1a1a}
.ai-box{background:#fff;border:1px solid #e8e8e0;border-radius:8px;padding:14px;margin-top:10px;font-size:14px;line-height:1.75;min-height:80px;white-space:pre-wrap}
.ai-hint{color:#888;font-style:italic}
.msg{font-size:13px;color:#888}
.toast{position:fixed;bottom:20px;right:20px;background:#1a1a1a;color:#fff;padding:9px 18px;border-radius:6px;font-size:13px;display:none;z-index:999}
</style>
</head>
<body>
<div class="header">
  <div class="logo">綠</div>
  <h1>工程報價資料庫</h1>
  <span class="sub" id="hdr-count"></span>
</div>
<div class="tabs">
  <button class="tab on" onclick="sw('list',this)">🗂 資料庫</button>
  <button class="tab" onclick="sw('query',this)">🤖 AI查詢</button>
  <button class="tab" onclick="sw('add',this)">➕ 新增</button>
</div>

<!-- 資料庫 -->
<div id="panel-list" class="panel on">
  <div class="stat-row" id="stat-row"></div>
  <div class="toolbar">
    <input type="text" id="search" placeholder="搜尋品名、規格、供應商…" oninput="render()">
    <button class="btn" onclick="clearSearch()">清除</button>
    <button class="btn" onclick="exportCSV()">匯出 CSV</button>
  </div>
  <div class="filter-row" id="cats"></div>
  <div class="source-row" id="sources"></div>
  <div class="list" id="list"></div>
</div>

<!-- AI查詢 -->
<div id="panel-query" class="panel">
  <div class="quick-wrap" id="qtags"></div>
  <div style="display:flex;gap:8px">
    <input type="text" id="qi" style="flex:1;padding:8px 12px;font-size:14px;border:1px solid #d0d0c8;border-radius:6px;outline:none" placeholder="例：25KV 電纜 100mm² 哪家最便宜？逆變器 60kW 單價多少？" onkeydown="if(event.key==='Enter')ask()">
    <button class="btn btn-p" onclick="ask()">查詢</button>
  </div>
  <div id="qstatus" class="msg" style="margin-top:6px"></div>
  <div id="ai-box" class="ai-box ai-hint">輸入問題後按查詢，AI 會從 1411 筆資料中回答…</div>
</div>

<!-- 新增 -->
<div id="panel-add" class="panel">
  <p style="font-size:13px;color:#666;margin-bottom:10px">貼上報價單或任意文字，自動解析品名、單價、廠商</p>
  <textarea id="paste" placeholder="貼上文字，例如：
電纜 25KV 100mm²  NT$670/M  大亞
逆變器 75kW  108,750元  新望
支架 7,000/kW  鋼構廠商"></textarea>
  <div style="display:flex;gap:8px;margin-top:8px;align-items:center">
    <button class="btn btn-p" onclick="parsePaste()">解析加入</button>
    <span id="pstatus" class="msg"></span>
  </div>
  <hr>
  <p style="font-size:13px;color:#666;margin-bottom:10px">手動新增單筆</p>
  <div class="form-grid">
    <div class="fg"><label>品名*</label><input id="mn" placeholder="例：NFB 3P 250AF 380V"></div>
    <div class="fg"><label>單價*</label><input id="mp" type="number" placeholder="例：3000"></div>
    <div class="fg"><label>單位</label><input id="mu" placeholder="例：只、M、式、kW"></div>
    <div class="fg"><label>供應商</label><input id="ms" placeholder="例：士林、大亞、海懋"></div>
    <div class="fg"><label>類別</label>
      <select id="mc">
        <option value="">選擇類別</option>
        <option>線材電纜</option><option>太陽能模組</option><option>逆變器</option>
        <option>支架鋼構</option><option>變壓器</option><option>管材類</option>
        <option>NFB開關</option><option>ACB開關</option><option>UPS</option>
        <option>監控系統</option><option>顧問服務</option><option>消防設備</option>
        <option>工班工資</option><option>其他</option>
      </select>
    </div>
    <div class="fg"><label>日期/來源</label><input id="md" placeholder="例：2025/10、振興兆豐案"></div>
  </div>
  <button class="btn btn-p" onclick="addManual()">新增</button>
</div>
<div class="toast" id="toast"></div>

      let added = 0;
      PRELOAD.forEach(p => { if(!savedIds.has(p.id)){db.push(p);added++;} });
      if(added > 0) save();
    } catch(e) { db = [...PRELOAD]; save(); }
  } else {
    db = [...PRELOAD];
    save();
  }
  renderStats();
  render();
  renderQTags();
  document.getElementById('hdr-count').textContent = db.length + ' 筆資料';
}

function save() { localStorage.setItem(KEY, JSON.stringify(db)); }

function renderStats() {
  const cats = new Set(db.map(i=>i.category).filter(Boolean));
  const sups = new Set(db.map(i=>i.supplier).filter(Boolean));
  const srcs = new Set(db.map(i=>i.source).filter(Boolean));
  document.getElementById('stat-row').innerHTML = `
    <div class="stat"><div class="stat-num">${db.length}</div><div class="stat-label">筆資料</div></div>
    <div class="stat"><div class="stat-num">${cats.size}</div><div class="stat-label">類別</div></div>
    <div class="stat"><div class="stat-num">${sups.size}</div><div class="stat-label">供應商</div></div>
    <div class="stat"><div class="stat-num">${srcs.size}</div><div class="stat-label">資料來源</div></div>`;
}

function render() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  const tokens = q.split(/\s+/).filter(Boolean);

  let filtered = db.filter(item => {
    const text = (item.name+' '+item.supplier+' '+item.category+' '+item.source).toLowerCase();
    if(activeCat !== 'all' && item.category !== activeCat) return false;
    if(activeSrc !== 'all' && item.source !== activeSrc) return false;
    return tokens.every(t => text.includes(t));
  });

  // Render category filters
  const catCounts = {};
  db.filter(i => activeSrc==='all' || i.source===activeSrc).forEach(i => {
    catCounts[i.category||'其他'] = (catCounts[i.category||'其他']||0)+1;
  });
  document.getElementById('cats').innerHTML =
    `<button class="fbtn ${activeCat==='all'?'on':''}" onclick="setCat('all',this)">全部 (${db.length})</button>` +
    Object.entries(catCounts).sort((a,b)=>b[1]-a[1]).map(([c,n])=>
      `<button class="fbtn ${activeCat===c?'on':''}" onclick="setCat('${c.replace(/'/g,"\'")}',this)">${c} (${n})</button>`
    ).join('');

  // Render source filters
  const srcCounts = {};
  db.forEach(i => { srcCounts[i.source||'未知'] = (srcCounts[i.source||'未知']||0)+1; });
  document.getElementById('sources').innerHTML =
    `<button class="sbtn ${activeSrc==='all'?'on':''}" onclick="setSrc('all',this)">所有來源</button>` +
    Object.entries(srcCounts).sort((a,b)=>b[1]-a[1]).map(([s,n])=>
      `<button class="sbtn ${activeSrc===s?'on':''}" onclick="setSrc('${s.replace(/'/g,"\'")}',this)">${s} (${n})</button>`
    ).join('');

  if(!filtered.length) {
    document.getElementById('list').innerHTML = '<div class="empty">找不到符合資料</div>';
    return;
  }

  document.getElementById('list').innerHTML = filtered.map(item => {
    const ap = item.ap || {};
    const apKeys = Object.keys(ap);
    const apStr = apKeys.length > 1 ? apKeys.map(k=>`${k}:${Number(ap[k]).toLocaleString()}`).join(' / ') : '';
    const srcShort = (item.source||'').length > 12 ? (item.source||'').substring(0,12)+'…' : (item.source||'');
    return `<div class="card">
      <div class="card-left">
        <div class="cname" title="${item.name}">${item.name}</div>
        <div class="cmeta">
          ${item.category?`<span class="badge bc">${item.category}</span>`:''}
          ${item.supplier?`<span class="badge bs">${item.supplier}</span>`:''}
          ${srcShort?`<span class="badge bsrc">${srcShort}</span>`:''}
          ${item.date?`<span class="badge bsrc">${item.date}</span>`:''}
          ${apKeys.length>1?`<span class="badge bap">多家</span>`:''}
        </div>
        ${apStr?`<div style="font-size:11px;color:#888;margin-top:3px">${apStr}</div>`:''}
      </div>
      <div class="card-right">
        <div>
          <div class="cprice">NT$${Number(item.price).toLocaleString()}</div>
          <div class="cunit">/${item.unit||'式'}</div>
        </div>
        <button class="del" onclick="del('${item.id}')">刪</button>
      </div>
    </div>`;
  }).join('');
}

function setCat(c, el) {
  activeCat = c;
  document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('on'));
  el.classList.add('on');
  render();
}
function setSrc(s, el) {
  activeSrc = s;
  document.querySelectorAll('.sbtn').forEach(b=>b.classList.remove('on'));
  el.classList.add('on');
  render();
}
function clearSearch() { document.getElementById('search').value=''; render(); }

function del(id) {
  db = db.filter(i=>i.id!==id);
  save(); renderStats(); render();
  document.getElementById('hdr-count').textContent = db.length + ' 筆資料';
}

function sw(id, el) {
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));
  document.getElementById('panel-'+id).classList.add('on');
  el.classList.add('on');
}

function renderQTags() {
  const tags = [
    '25KV XLPE 電纜 100mm²',
    'NFB 3P 250AF',
    '逆變器 75kW',
    '太陽能模組 單價',
    '變壓器 1000KVA',
    '支架 單價/kW',
    '儲能顧問費',
    '技師簽證費',
  ];
  document.getElementById('qtags').innerHTML = tags.map(t=>`<button class="qtag" onclick="setQ('${t}')">${t}</button>`).join('');
}
function setQ(q){ document.getElementById('qi').value=q; ask(); }

async function ask() {
  const q = document.getElementById('qi').value.trim();
  if(!q) return;
  const box = document.getElementById('ai-box');
  box.className='ai-box ai-hint';
  box.textContent='查詢中…';
  document.getElementById('qstatus').textContent='';

  const dbText = db.map(i=>{
    let s = `${i.name}｜NT$${i.price}/${i.unit}｜${i.supplier||'-'}｜${i.category||''}｜來源:${i.source||''}`;
    const ap = i.ap||{};
    if(Object.keys(ap).length>1) s += '｜多家:'+Object.entries(ap).map(([k,v])=>`${k}=$${v}`).join(',');
    return s;
  }).join('\n');

  const prompt = `你是綠源科技EPC工程採購助理，專精太陽能及儲能工程報價查詢。

以下是完整報價資料庫（共${db.length}筆，含線材電纜、變壓器、開關、逆變器、太陽能模組、支架、顧問服務、工班工資等）：

${dbText}

使用者查詢：${q}

請直接根據資料庫資料回答，用繁體中文，格式清晰易讀。
- 若有多廠商可比價，請製作簡潔比較表
- 若有多筆相同品項（不同來源案場），列出價格區間
- 若查無資料，請說明並建議搜尋關鍵字`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1200,messages:[{role:'user',content:prompt}]})
    });
    const data = await res.json();
    const text = (data.content||[]).map(c=>c.text||'').join('') || '查詢失敗';
    box.className='ai-box';
    box.textContent=text;
  } catch(e) {
    box.className='ai-box';
    box.textContent='錯誤：'+e.message;
  }
}

function parsePaste() {
  const raw = document.getElementById('paste').value.trim();
  if(!raw) return;
  let added = 0;
  raw.split('\n').filter(l=>l.trim()).forEach(line=>{
    const pm = line.match(/NT\$?([\d,]+)/i)||line.match(/([\d,]+)\s*元/);
    if(!pm) return;
    const price = parseInt(pm[1].replace(/,/g,''));
    if(!price||price<=0) return;
    const um = line.match(/\/(\S+)/);
    const unit = um?um[1].substring(0,10):'式';
    const dm = line.match(/(\d{4}\/\d{1,2})/);
    let name = line.split(/NT\$|\/|元/)[0].replace(/\s*(單價|報價|\d+)\s*/g,'').trim().substring(0,50);
    if(!name) return;
    db.push({id:String(Date.now()+Math.random()),name,price,unit,supplier:'',category:'其他',source:'手動匯入',date:dm?dm[1]:'',ap:{}});
    added++;
  });
  save(); renderStats(); render();
  document.getElementById('paste').value='';
  document.getElementById('pstatus').textContent=`已加入 ${added} 筆`;
  document.getElementById('hdr-count').textContent = db.length + ' 筆資料';
  setTimeout(()=>document.getElementById('pstatus').textContent='',3000);
}

function addManual() {
  const name=document.getElementById('mn').value.trim();
  const price=parseInt(document.getElementById('mp').value)||0;
  if(!name||!price){toast('請填寫品名和單價');return;}
  db.push({
    id:String(Date.now()),name,price,
    unit:document.getElementById('mu').value.trim()||'式',
    supplier:document.getElementById('ms').value.trim(),
    category:document.getElementById('mc').value||'其他',
    source:document.getElementById('md').value.trim()||'手動',
    date:'',ap:{}
  });
  save(); renderStats(); render();
  ['mn','mp','mu','ms','md'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('mc').value='';
  document.getElementById('hdr-count').textContent = db.length + ' 筆資料';
  toast('已新增');
}

function exportCSV(){
  const rows=[['品名','單價','單位','供應商','類別','來源','日期']];
  db.forEach(i=>rows.push([i.name,i.price,i.unit,i.supplier,i.category,i.source,i.date]));
  const csv=rows.map(r=>r.map(c=>`"${String(c||'').replace(/"/g,'""')}"`).join(',')).join('\n');
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent(csv);
  a.download='綠源報價資料庫.csv';a.click();
}

function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.style.display='block';
  setTimeout(()=>t.style.display='none',2000);
}

init();
</script>
